name: Go build

on:
  workflow_call:
    inputs:
      workspace:
        description: go module workspace
        required: false
        type: string
        default: '.'
      go_version:
        description: Go version for actions/setup-go (e.g. 1.23.x, 1.26.0, stable)
        required: false
        type: string
        default: '1.26.x'
      run_tests:
        description: Whether to run `go test` step
        required: false
        type: boolean
        default: true

jobs:
  build:
    runs-on: [gcp]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Cache Go modules and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-${{ runner.os }}-${{ inputs.go_version }}-${{ hashFiles(format('{0}/go.sum', inputs.workspace)) }}
          restore-keys: |
            go-${{ runner.os }}-${{ inputs.go_version }}-
      - name: Setup go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go_version }}
          check-latest: true
          cache: false
      - name: Set up netrc
        uses: extractions/netrc@v1
        with:
          machine: buf.build
          username: ${{ secrets.BUF_USERNAME }}
          password: ${{ secrets.BUF_TOKEN }}
      - name: Set up github netrc
        uses: extractions/netrc@v1
        with:
          machine: github.com
          username: ${{ secrets.GH_PACKAGES_ORG_USERNAME }}
          password: ${{ secrets.GH_PACKAGES_ORG_TOKEN }}
      - name: Go lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: "v2.11"
          working-directory: ${{ inputs.workspace }}
          args: --timeout 15m --concurrency=4
          skip-cache: false
          cache-invalidation-interval: 14
      - name: Go build
        run: go build -v ./${{ inputs.workspace }}/...
      - name: Go test
        if: ${{ inputs.run_tests }}
        run: go test -v ./${{ inputs.workspace }}/...
