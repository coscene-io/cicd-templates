name: Sub-chart Upgrade

on:
  workflow_call:
    inputs:
      deployment-name:
        description: 'the name of deployment to be upgraded'
        required: true
        type: string
      container-name:
        description: 'the name of container whose image should be updated'
        required: false
        type: string
        default: ''
      image:
        description: 'the full image reference to deploy'
        required: false
        type: string
        default: ''

jobs:
  sub-chart-upgrade:
    runs-on: ubuntu-latest
    environment: volcengine-dev-cn-shanghai
    timeout-minutes: 5
    steps:
      - name: Set up CD tools
        uses: coscene-io/setup-cd-tools@v2.0.1
        env:
          ACTIONS_ALLOW_UNSECURE_COMMANDS: "true"
        with:
          kubectl: '1.22.2'
      - name: VKE login
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.VOLCENGINE_DEV_KUBE_CONFIG }}
      - name: Update deployment image
        if: ${{ inputs.container-name != '' && inputs.image != '' }}
        run: |
          kubectl set image deployment/${{ inputs.deployment-name }} ${{ inputs.container-name }}=${{ inputs.image }} -n coscene
      - name: Restart pods about target sub-chart
        if: ${{ inputs.container-name == '' || inputs.image == '' }}
        run: |
          kubectl rollout restart deployment/${{ inputs.deployment-name }} -n coscene
      - name: Wait for deployment rollout
        run: |
          kubectl rollout status deployment/${{ inputs.deployment-name }} -n coscene --timeout=120s
      - name: Notification to Feishu
        uses: foxundermoon/feishu-action@v2
        with:
          url: ${{ secrets.FEISHU_BOT_WEBHOOK_URL_RHODE_ISLAND }}
          msg_type: text
          content: |
            text: |
              Sub-chart upgrade!
              the deployment ${{ inputs.deployment-name }} restarted.
              GitHubEvent: ${{ github.event_name }}
              committer: ${{ github.actor }}
              baseRef: ${{ github.ref }}
